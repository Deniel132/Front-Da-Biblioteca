<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteca</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <script src="app.js"></script>

    <header>
        <img class="logo" src="https://images.vexels.com/media/users/3/215185/raw/9975fac6938d6d19c33105e44655a3c8-design-de-logotipo-do-restaurante-cheff.jpg" alt="logo">
        <h1>Teste Biblioteja Spring</h1>
    </header>


    <div class="conteudo">
        <img class="PratoInicial" src="https://viagem.cnnbrasil.com.br/wp-content/uploads/sites/5/2025/02/Assador_credito-divulgacao.jpg?w=849&h=477&crop=0" alt="PratoInicial">
        
       <div class="reserva">
    <h2>Bem-vindo à Biblioteca do HTML!</h2>
    <h4>Controle de Clientes</h4>

    <div class="acoes-container">
        
        <div class="reserva-card">
                <h2>Cadastro de Clientes</h2>
            <div class="id-container">
                    <span>ID do Registro:</span>
                    <h2 id="imput" class="id-display">Aguardando...</h2>
            </div>
                <input type="text" id="nome" placeholder="Nome do Cliente">
                <input type="text" id="email" placeholder="E-mail">
                <input type="date" id="data">
                
                <button onclick="setInfo()" class="buttonReserva">Cadastrar</button>
                <h2 id="postInfo" style="font-size: 1rem; color: #30d64c;"></h2>
        </div>

        <div class="reserva-card">
            <h2>Clientes na Base</h2>
            <button onclick="getInfo()" class="buttonReserva" style="background-color: #2d3436;">Atualizar Lista</button>
            
            <div id="listaResultados" class="lista-scroll">
                <p id="getInfo">Clique em GET para carregar...</p>
            </div>
        </div>

    </div>
</div>
    <div class="contato">
        <h2>Contato: </h2>
        <p>Email: TiagoPilantra@gmail.com</p>
        <p>Telefone: (44) 99999-9999</p>
        <p>Instagram: @RestauranteSabooorHTML</p>
    </div>


</body>
</html>
